kind = "web"
previewPath = "/"
title = "Regional Carpool"
version = "1.0.0"
id = "artifacts/regional-carpool"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24128

[services.development]
run = "pnpm --filter @workspace/regional-carpool run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/regional-carpool", "run", "build" ]
publicDir = "artifacts/regional-carpool/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24128"
BASE_PATH = "/"
